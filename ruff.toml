target-version = "py310"

[lint]
select = [
    "F",     # pyflakes
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "UP",    # pyupgrade
    "B",     # flake8-bugbear
    "SIM",   # flake8-simplify
    "C4",    # flake8-comprehensions
    "RUF",   # ruff-specific
    "I",     # isort
]
ignore = [
    "B905",  # zip(strict=) — preserve Python <3.10 compat
    "E501",  # line length — handled by ruff format
]
